<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Logg - Multi Vehicle</title>

<style>
body { font-family: system-ui; background:#f5f5f5; padding:16px; }

h2 { margin-bottom:10px; }

button {
  padding:8px;
  border:none;
  background:black;
  color:white;
  margin:4px;
  cursor:pointer;
}

input {
  padding:6px;
  border:1px solid #ccc;
  border-radius:4px;
}

.vehicle-bar {
  margin-bottom:10px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.vehicle-bar button {
  background:#333;
}

.vehicle-bar button.active {
  background:#1e88e5;
}

.section {
  background:#1e88e5;
  color:white;
  padding:10px;
  margin-top:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-radius:4px;
}

.section input {
  font-weight:bold;
  background:transparent;
  border:none;
  color:white;
  font-size:16px;
  width:50%;
}

.table {
  width:100%;
  border-collapse:collapse;
  margin-top:6px;
  background:white;
}

.table th, .table td {
  border:1px solid #ddd;
  padding:6px;
  text-align:center;
}

.table th {
  background:#f57c00;
  color:white;
}

.row-label {
  text-align:left;
  background:#fafafa;
}

.controls {
  display:flex;
  gap:6px;
}

.delete {
  background:red;
}

.add {
  background:#4caf50;
}

.container {
  margin-bottom:18px;
}

.smallbtn {
  padding:4px 6px;
  font-size:12px;
}

</style>
</head>

<body>

<h2>Service Logg (Multi Vehicle)</h2>

<div class="vehicle-bar" id="vehicleBar"></div>

<button onclick="addVehicle()">➕ Ny bil</button>

<div id="app"></div>

<script>
let data = JSON.parse(localStorage.getItem('service_multi') || 'null');

if(!data){
  data = {
    activeVehicle:0,
    vehicles:[
      {
        name:"Volvo",
        headers:["53,1","110","172"],
        sections:[
          {
            name:"Motor",
            rows:[
              {label:"Olje", values:["✔","","✔"]},
              {label:"Filter", values:["✔","",""]}
            ]
          }
        ]
      }
    ]
  };
}

function save(){
  localStorage.setItem('service_multi', JSON.stringify(data));
  render();
}

function getV(){
  return data.vehicles[data.activeVehicle];
}

// VEHICLES
function setActive(i){
  data.activeVehicle = i;
  save();
}

function addVehicle(){
  data.vehicles.push({
    name:"Ny bil",
    headers:["100","200","300"],
    sections:[]
  });
  data.activeVehicle = data.vehicles.length - 1;
  save();
}

function deleteVehicle(i){
  data.vehicles.splice(i,1);
  if(data.activeVehicle >= data.vehicles.length){
    data.activeVehicle = 0;
  }
  save();
}

function renameVehicle(i,val){
  data.vehicles[i].name = val;
  save();
}

// HEADERS (KM/TIME)
function addHeader(){
  getV().headers.push("ny");
  save();
}

function removeHeader(){
  const v = getV();
  v.headers.pop();
  v.sections.forEach(s=>{
    s.rows.forEach(r=>r.values.pop());
  });
  save();
}

function updateHeader(i,val){
  getV().headers[i]=val;
  save();
}

// SECTIONS
function addSection(){
  getV().sections.push({name:"Ny seksjon", rows:[]});
  save();
}

function deleteSection(i){
  getV().sections.splice(i,1);
  save();
}

function updateSectionName(i,val){
  getV().sections[i].name=val;
  save();
}

// ROWS
function addRow(s){
  const v=getV();
  v.sections[s].rows.push({
    label:"Ny rad",
    values:Array(v.headers.length).fill("")
  });
  save();
}

function deleteRow(s,r){
  getV().sections[s].rows.splice(r,1);
  save();
}

function updateRowLabel(s,r,val){
  getV().sections[s].rows[r].label=val;
  save();
}

function toggleCell(s,r,c){
  let v=getV().sections[s].rows[r].values[c];
  getV().sections[s].rows[r].values[c]=v==="✔"?"":"✔";
  save();
}

// UI
function renderVehicles(){
  const bar=document.getElementById('vehicleBar');
  bar.innerHTML='';

  data.vehicles.forEach((v,i)=>{
    bar.innerHTML+=`
      <button class="${i===data.activeVehicle?'active':''}" onclick="setActive(${i})">
        <input value="${v.name}" onchange="renameVehicle(${i},this.value)" style="width:80px">
      </button>
      <button class="smallbtn delete" onclick="deleteVehicle(${i})">X</button>
    `;
  });
}

function render(){
  renderVehicles();

  const v=getV();
  const app=document.getElementById('app');
  app.innerHTML='';

  // header controls
  const controls=document.createElement('div');
  controls.innerHTML=`
    <button onclick="addHeader()">+ KM/t</button>
    <button onclick="removeHeader()">- KM/t</button>
    <button onclick="addSection()">+ seksjon</button>
  `;
  app.appendChild(controls);

  v.sections.forEach((sec,sIndex)=>{

    const wrapper=document.createElement('div');

    wrapper.innerHTML=`
      <div class="section">
        <input value="${sec.name}" onchange="updateSectionName(${sIndex},this.value)">
        <div class="controls">
          <button class="add" onclick="addRow(${sIndex})">+ rad</button>
          <button class="delete" onclick="deleteSection(${sIndex})">Slett</button>
        </div>
      </div>

      <div class="container">
        <table class="table">
          <tr>
            <th>Oppgave</th>
            ${v.headers.map((h,i)=>`
              <th contenteditable oninput="updateHeader(${i},this.innerText)">${h}</th>
            `).join('')}
          </tr>
        </table>
      </div>
    `;

    app.appendChild(wrapper);

    const table=wrapper.querySelector('table');

    sec.rows.forEach((row,rIndex)=>{
      const tr=document.createElement('tr');

      tr.innerHTML=`
        <td class="row-label">
          <input value="${row.label}" onchange="updateRowLabel(${sIndex},${rIndex},this.value)">
          <button class="delete" onclick="deleteRow(${sIndex},${rIndex})">X</button>
        </td>
        ${row.values.map((v,cIndex)=>`
          <td onclick="toggleCell(${sIndex},${rIndex},${cIndex})">${v}</td>
        `).join('')}
      `;

      table.appendChild(tr);
    });
  });
}

render();
</script>

</body>
</html>
