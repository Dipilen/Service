<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Logg</title>

<style>
body { font-family: system-ui; background:#f5f5f5; padding:16px; }

h2 { margin-bottom:10px; }

button {
  padding:10px;
  border:none;
  background:black;
  color:white;
  margin:4px;
  cursor:pointer;
}

input {
  padding:6px;
  border:1px solid #ccc;
  border-radius:4px;
}

.section {
  background:#1e88e5;
  color:white;
  padding:10px;
  margin-top:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-radius:4px;
}

.section input {
  font-weight:bold;
  background:transparent;
  border:none;
  color:white;
  font-size:16px;
  width:60%;
}

.container {
  margin-top:6px;
  margin-bottom:10px;
}

.row {
  display:flex;
  gap:8px;
  background:white;
  padding:8px;
  border:1px solid #ddd;
  border-radius:4px;
  align-items:center;
  margin-bottom:6px;
}

.row input {
  flex:1;
  border:1px solid #ddd;
  padding:6px;
}

.delete {
  background:red;
}

.add-row {
  background:#4caf50;
}

.top-bar {
  margin-bottom:10px;
}
</style>
</head>

<body>

<h2>Service Logg</h2>

<div class="top-bar">
  <button onclick="addSection()">➕ Ny seksjon</button>
</div>

<div id="app"></div>

<script>
let data = JSON.parse(localStorage.getItem('service_v3') || 'null');

if(!data){
  data = {
    sections:[
      {name:"Motor", rows:["Olje","Olje-filter"]},
      {name:"Kontroll", rows:["Luft-filter"]},
      {name:"Kommentar", rows:[""]}
    ]
  };
}

function save(){
  localStorage.setItem('service_v3', JSON.stringify(data));
  render();
}

function addSection(){
  data.sections.push({name:"Ny seksjon", rows:[]});
  save();
}

function deleteSection(i){
  data.sections.splice(i,1);
  save();
}

function addRow(s){
  data.sections[s].rows.push("Ny rad");
  save();
}

function deleteRow(s,r){
  data.sections[s].rows.splice(r,1);
  save();
}

function updateSectionName(i,val){
  data.sections[i].name = val;
  save();
}

function updateRow(s,r,val){
  data.sections[s].rows[r] = val;
  save();
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';

  data.sections.forEach((sec,sIndex)=>{

    const wrapper = document.createElement('div');

    wrapper.innerHTML = `
      <div class="section">
        <input value="${sec.name}" onchange="updateSectionName(${sIndex},this.value)">
        <div>
          <button onclick="addRow(${sIndex})">+ rad</button>
          <button class="delete" onclick="deleteSection(${sIndex})">Slett</button>
        </div>
      </div>

      <div class="container" id="sec-${sIndex}"></div>
    `;

    app.appendChild(wrapper);

    const container = document.getElementById(`sec-${sIndex}`);

    sec.rows.forEach((row,rIndex)=>{
      const rowDiv = document.createElement('div');
      rowDiv.className = 'row';

      rowDiv.innerHTML = `
        <input value="${row}" onchange="updateRow(${sIndex},${rIndex},this.value)">
        <button class="delete" onclick="deleteRow(${sIndex},${rIndex})">X</button>
      `;

      container.appendChild(rowDiv);
    });
  });
}

render();
</script>

</body>
</html>
