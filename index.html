<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Logg</title>

<style>
body { font-family: system-ui; background:#f5f5f5; padding:16px; }

h2 { margin-bottom:10px; }

button {
  padding:8px;
  border:none;
  background:black;
  color:white;
  margin:4px;
  cursor:pointer;
}

input {
  padding:6px;
  border:1px solid #ccc;
  border-radius:4px;
}

.section {
  background:#1e88e5;
  color:white;
  padding:10px;
  margin-top:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-radius:4px;
}

.section input {
  font-weight:bold;
  background:transparent;
  border:none;
  color:white;
  font-size:16px;
  width:60%;
}

.table {
  width:100%;
  border-collapse:collapse;
  margin-top:6px;
  background:white;
}

.table th, .table td {
  border:1px solid #ddd;
  padding:6px;
  text-align:center;
}

.table th {
  background:#f57c00;
  color:white;
}

.row-label {
  text-align:left;
  background:#fafafa;
}

.controls {
  display:flex;
  gap:6px;
}

.delete {
  background:red;
}

.add {
  background:#4caf50;
}

.container {
  margin-bottom:18px;
}

</style>
</head>

<body>

<h2>Service Logg (Hybrid)</h2>

<button onclick="addSection()">➕ Ny seksjon</button>

<div id="app"></div>

<script>
let data = JSON.parse(localStorage.getItem('service_hybrid') || 'null');

if(!data){
  data = {
    headers:["53,1","110","172"],
    sections:[
      {
        name:"Motor",
        rows:[
          {label:"Olje", values:["✔","","✔"]},
          {label:"Filter", values:["✔","",""]}
        ]
      },
      {
        name:"Kontroll",
        rows:[
          {label:"Luft-filter", values:["","✔",""]}
        ]
      }
    ]
  };
}

function save(){
  localStorage.setItem('service_hybrid', JSON.stringify(data));
  render();
}

function addSection(){
  data.sections.push({name:"Ny seksjon", rows:[]});
  save();
}

function deleteSection(i){
  data.sections.splice(i,1);
  save();
}

function addRow(s){
  data.sections[s].rows.push({
    label:"Ny rad",
    values:Array(data.headers.length).fill("")
  });
  save();
}

function deleteRow(s,r){
  data.sections[s].rows.splice(r,1);
  save();
}

function updateSectionName(i,val){
  data.sections[i].name = val;
  save();
}

function updateHeader(i,val){
  data.headers[i] = val;
  save();
}

function updateRowLabel(s,r,val){
  data.sections[s].rows[r].label = val;
  save();
}

function toggleCell(s,r,c){
  let v = data.sections[s].rows[r].values[c];
  data.sections[s].rows[r].values[c] = v === "✔" ? "" : "✔";
  save();
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';

  data.sections.forEach((sec,sIndex)=>{

    const wrapper = document.createElement('div');

    wrapper.innerHTML = `
      <div class="section">
        <input value="${sec.name}" onchange="updateSectionName(${sIndex},this.value)">
        <div class="controls">
          <button class="add" onclick="addRow(${sIndex})">+ rad</button>
          <button class="delete" onclick="deleteSection(${sIndex})">Slett</button>
        </div>
      </div>

      <div class="container">
        <table class="table">
          <tr>
            <th>Oppgave</th>
            ${data.headers.map((h,i)=>`
              <th contenteditable oninput="updateHeader(${i},this.innerText)">${h}</th>
            `).join('')}
          </tr>
        </table>
      </div>
    `;

    app.appendChild(wrapper);

    const table = wrapper.querySelector('table');

    sec.rows.forEach((row,rIndex)=>{
      const tr = document.createElement('tr');

      tr.innerHTML = `
        <td class="row-label">
          <input value="${row.label}" onchange="updateRowLabel(${sIndex},${rIndex},this.value)">
          <button class="delete" onclick="deleteRow(${sIndex},${rIndex})">X</button>
        </td>
        ${row.values.map((v,cIndex)=>`
          <td onclick="toggleCell(${sIndex},${rIndex},${cIndex})">
            ${v}
          </td>
        `).join('')}
      `;

      table.appendChild(tr);
    });
  });
}

render();
</script>

</body>
</html>
