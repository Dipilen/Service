<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Logg - Optimized Engine</title>

<style>
body{font-family:system-ui;background:#f5f5f5;padding:16px;}
button{padding:8px;border:none;background:#111;color:#fff;margin:4px;cursor:pointer;border-radius:4px;}
input{padding:6px;border:1px solid #ccc;border-radius:4px;}

.vehicle{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;align-items:center;}
.vehicle button.active{background:#1e88e5;}

.topbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}

.section{background:#1e88e5;color:#fff;padding:10px;margin-top:14px;display:flex;justify-content:space-between;align-items:center;border-radius:4px;}
.section input{background:transparent;border:none;color:#fff;font-weight:bold;font-size:16px;width:50%;}

.table{width:100%;border-collapse:collapse;margin-top:6px;background:#fff;}
.table th,.table td{border:1px solid #ddd;padding:6px;text-align:center;}
.table th{background:#f57c00;color:#fff;}
.rowlabel{text-align:left;background:#fafafa;}

.cell{cursor:pointer;user-select:none;}
.cell.checked{background:#c8e6c9;font-weight:bold;}

.danger{background:red;}
.small{padding:4px 6px;font-size:12px;}

</style>
</head>
<body>

<h2>Service Logg (Optimized)</h2>

<div class="vehicle" id="vehicleBar"></div>
<button onclick="addVehicle()">➕ Ny bil</button>

<div class="topbar">
<button onclick="addHeader()">+ KM/t</button>
<button onclick="removeHeader()">- KM/t</button>
<button onclick="addSection()">+ seksjon</button>
</div>

<div id="app"></div>

<script>

let state = JSON.parse(localStorage.getItem('service_state')||'null');

if(!state){
  state={
    activeVehicle:0,
    vehicles:[
      {
        name:"Volvo",
        headers:["53,1","110","172"],
        sections:[
          {
            name:"Motor",
            rows:[
              {label:"Olje",values:["✔","","✔"]}
            ]
          }
        ]
      }
    ]
  };
}

function save(){
  localStorage.setItem('service_state',JSON.stringify(state));
}

function v(){return state.vehicles[state.activeVehicle];}

// VEHICLES
function addVehicle(){
  state.vehicles.push({name:"Ny bil",headers:["100","200"],sections:[]});
  state.activeVehicle=state.vehicles.length-1;
  save();render();
}

function setVehicle(i){state.activeVehicle=i;save();render();}
function renameVehicle(i,val){state.vehicles[i].name=val;save();}
function deleteVehicle(i){state.vehicles.splice(i,1);if(state.activeVehicle>=state.vehicles.length)state.activeVehicle=0;save();render();}

// HEADERS
function addHeader(){
  const veh=v();
  veh.headers.push("ny");
  veh.sections.forEach(s=>s.rows.forEach(r=>r.values.push("")));
  save();render();
}

function removeHeader(){
  const veh=v();
  veh.headers.pop();
  veh.sections.forEach(s=>s.rows.forEach(r=>r.values.pop()));
  save();render();
}

function updateHeader(i,val){v().headers[i]=val;save();}

// SECTIONS
function addSection(){v().sections.push({name:"Ny seksjon",rows:[]});save();render();}
function deleteSection(i){v().sections.splice(i,1);save();render();}
function renameSection(i,val){v().sections[i].name=val;save();}

// ROWS
function addRow(s){v().sections[s].rows.push({label:"Ny rad",values:Array(v().headers.length).fill("")});save();render();}
function deleteRow(s,r){v().sections[s].rows.splice(r,1);save();render();}
function renameRow(s,r,val){v().sections[s].rows[r].label=val;save();}

// CELL TOGGLE (NO FULL RENDER)
function toggleCell(s,r,c,el){
  const cell=v().sections[s].rows[r].values[c];
  const newVal=cell==="✔"?"":"✔";
  v().sections[s].rows[r].values[c]=newVal;
  save();

  el.classList.toggle('checked',newVal==="✔");
  el.textContent=newVal;
}

// RENDER VEHICLES
function renderVehicles(){
  const bar=document.getElementById('vehicleBar');
  bar.innerHTML="";
  state.vehicles.forEach((x,i)=>{
    bar.innerHTML+=`
      <button class="${i===state.activeVehicle?'active':''}" onclick="setVehicle(${i})">${x.name}</button>
      <input value="${x.name}" onchange="renameVehicle(${i},this.value)">
      <button class="danger small" onclick="deleteVehicle(${i})">X</button>
    `;
  });
}

function render(){
  renderVehicles();

  const app=document.getElementById('app');
  app.innerHTML="";

  const data=v();

  data.sections.forEach((sec,si)=>{

    const wrap=document.createElement('div');

    wrap.innerHTML=`
      <div class="section">
        <input value="${sec.name}" onchange="renameSection(${si},this.value)">
        <div>
          <button onclick="addRow(${si})">+ rad</button>
          <button class="danger" onclick="deleteSection(${si})">Slett</button>
        </div>
      </div>

      <table class="table">
        <tr>
          <th>Oppgave</th>
          ${data.headers.map((h,i)=>`<th contenteditable oninput="updateHeader(${i},this.innerText)">${h}</th>`).join('')}
        </tr>
      </table>
    `;

    app.appendChild(wrap);

    const table=wrap.querySelector('table');

    sec.rows.forEach((r,ri)=>{
      const tr=document.createElement('tr');

      tr.innerHTML=`
        <td class="rowlabel">
          <input value="${r.label}" onchange="renameRow(${si},${ri},this.value)">
          <button class="danger small" onclick="deleteRow(${si},${ri})">X</button>
        </td>
        ${r.values.map((c,ci)=>`
          <td class="cell ${c==='✔'?'checked':''}" 
              onclick="toggleCell(${si},${ri},${ci},this)">
            ${c}
          </td>
        `).join('')}
      `;

      table.appendChild(tr);
    });
  });
}

render();

</script>
</body>
</html>
