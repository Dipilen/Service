<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Logg - Final Stable Version</title>

<style>
body{font-family:system-ui;background:#f5f5f5;padding:16px;}
button{padding:8px;border:none;background:#111;color:#fff;margin:4px;cursor:pointer;border-radius:4px;}
input{padding:6px;border:1px solid #ccc;border-radius:4px;}
textarea{font-family:inherit;}

.vehicleBar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px;}
.vehicleBar button.active{background:#1e88e5;}

.topbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}

.section{
  background:#1e88e5;
  color:#fff;
  padding:10px;
  margin-top:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-radius:4px;
}
.section input{
  background:transparent;
  border:none;
  color:#fff;
  font-weight:bold;
  font-size:16px;
  width:55%;
}

.table{
  width:100%;
  border-collapse:collapse;
  margin-top:6px;
  background:#fff;
  font-size:0.85em;
}

.table th,.table td{
  border:1px solid #ddd;
  padding:4px;
  text-align:center;
  vertical-align:top;
}

.table th{
  background:#f57c00;
  color:#fff;
}

.rowlabel{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:6px;
  background:#fafafa;
  text-align:left;
}

.cell{
  cursor:pointer;
  user-select:none;
}

.cell.checked{
  background:#c8e6c9;
  font-weight:bold;
}

.noteCell{
  background:#fffde7;
}

.noteInput{
  width:100%;
  min-height:50px;
  border:none;
  background:#fffde7;
  resize:vertical;
}

.noteInput:focus{
  min-height:140px;
  outline:2px solid #f57c00;
}

.danger{background:red;}
.small{padding:4px 6px;font-size:12px;}

</style>
</head>
<body>

<h2>Service Logg</h2>

<button onclick="addVehicle()">➕ Kjøretøy</button>

<div class="vehicleBar" id="vehicleBar"></div>

<div class="topbar">
<button onclick="addHeader()">+ KM/timer</button>
<button onclick="removeHeader()">- KM/timer</button>
<button onclick="addSection()">+ seksjon</button>
</div>

<div id="app"></div>

<script>

let state=JSON.parse(localStorage.getItem('service_state')||'null');

if(!state){
  state={
    activeVehicle:0,
    vehicles:[
      {
        name:"Volvo",
        headers:["53,1","110","172"],
        sections:[
          {
            name:"Motor",
            rows:[
              {type:"check",label:"Olje",values:["✔","","✔"]},
              {type:"note",label:"Annet",values:["","",""]}
            ]
          }
        ]
      }
    ]
  };
}

function save(){
  localStorage.setItem('service_state',JSON.stringify(state));
}

function v(){return state.vehicles[state.activeVehicle];}

// VEHICLES
function addVehicle(){
  state.vehicles.push({name:"Kjøretøy",headers:["",""],sections:[]});
  state.activeVehicle=state.vehicles.length-1;
  save();render();
}

function setVehicle(i){state.activeVehicle=i;save();render();}
function renameVehicle(i,val){state.vehicles[i].name=val;save();}
function deleteVehicle(i){state.vehicles.splice(i,1);if(state.activeVehicle>=state.vehicles.length)state.activeVehicle=0;save();render();}

// HEADERS
function addHeader(){
  const veh=v();
  veh.headers.push("");
  veh.sections.forEach(s=>s.rows.forEach(r=>r.values.push("")));
  save();render();
}

function removeHeader(){
  const veh=v();
  veh.headers.pop();
  veh.sections.forEach(s=>s.rows.forEach(r=>r.values.pop()));
  save();render();
}

function updateHeader(i,val){v().headers[i]=val;save();}

// SECTIONS
function addSection(){
  v().sections.push({
    name:"Ny seksjon",
    rows:[{type:"note",label:"Annet",values:Array(v().headers.length).fill("")}]});
  save();render();
}

function deleteSection(i){v().sections.splice(i,1);save();render();}
function renameSection(i,val){v().sections[i].name=val;save();}

// ROWS
function addRow(s){
  const sec=v().sections[s];
  sec.rows.splice(sec.rows.length-1,0,{type:"check",label:"Ny rad",values:Array(v().headers.length).fill("")});
  save();render();
}

function deleteRow(s,r){v().sections[s].rows.splice(r,1);save();render();}
function renameRow(s,r,val){v().sections[s].rows[r].label=val;save();}

// CELLS
function toggleCell(s,r,c,el){
  const row=v().sections[s].rows[r];
  const nv=row.values[c]==="✔"?"":"✔";
  row.values[c]=nv;
  save();
  el.classList.toggle('checked',nv==="✔");
  el.textContent=nv;
}

function updateNote(s,r,c,val){v().sections[s].rows[r].values[c]=val;save();}

// RENDER
function renderVehicles(){
  const bar=document.getElementById('vehicleBar');
  bar.innerHTML="";

  state.vehicles.forEach((x,i)=>{
    bar.innerHTML+=`
      <button class="${i===state.activeVehicle?'active':''}" onclick="setVehicle(${i})">${x.name}</button>
      <input value="${x.name}" onchange="renameVehicle(${i},this.value)">
      <button class="danger small" onclick="deleteVehicle(${i})">X</button>
    `;
  });
}

function render(){
  renderVehicles();

  const app=document.getElementById('app');
  app.innerHTML="";

  const data=v();

  data.sections.forEach((sec,si)=>{

    const wrap=document.createElement('div');

    wrap.innerHTML=`
      <div class="section">
        <input value="${sec.name}" onchange="renameSection(${si},this.value)">
        <div>
          <button onclick="addRow(${si})">+ rad</button>
          <button class="danger" onclick="deleteSection(${si})">Slett</button>
        </div>
      </div>

      <table class="table">
        <tr>
          <th>Oppgave</th>
          ${data.headers.map((h,i)=>`<th contenteditable oninput="updateHeader(${i},this.innerText)">${h}</th>`).join('')}
        </tr>
      </table>
    `;

    app.appendChild(wrap);

    const table=wrap.querySelector('table');

    sec.rows.forEach((r,ri)=>{
      const tr=document.createElement('tr');

      const cells = r.type==='note'
        ? r.values.map((c,ci)=>
            `<td class="noteCell">
              <textarea class="noteInput" oninput="updateNote(${si},${ri},${ci},this.value)" onfocus="this.style.minHeight='140px'" onblur="this.style.minHeight='50px'">${c||''}</textarea>
            </td>`
          ).join('')
        : r.values.map((c,ci)=>
            `<td class="cell ${c==='✔'?'checked':''}" onclick="toggleCell(${si},${ri},${ci},this)">${c}</td>`
          ).join('');

      tr.innerHTML=`
        <td class="rowlabel">
          <input value="${r.label}" onchange="renameRow(${si},${ri},this.value)">
          ${r.type!=='note'?`<button class="danger small" onclick="deleteRow(${si},${ri})">X</button>`:''}
        </td>
        ${cells}
      `;

      table.appendChild(tr);
    });

  });
}

render();

</script>
</body>
</html>
